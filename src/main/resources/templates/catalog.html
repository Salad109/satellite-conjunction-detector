<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Satellite Catalog')}"></head>
<body>

<nav th:replace="~{fragments/nav :: nav('catalog')}"></nav>

<!-- Load sync status into nav on page load -->
<div hx-get="/hx/nav-status/sync"
     hx-swap="innerHTML"
     hx-target="#nav-status"
     hx-trigger="load"
     style="display:none"></div>

<main class="page-body">
    <div hx-get="/hx/satellites"
         hx-trigger="load"
         id="results">
        <p style="font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace">Loading satellites...</p>
    </div>
</main>

<footer class="app-footer" th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
