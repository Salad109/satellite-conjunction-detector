<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Conjunction #' + ${visualization.id})}"></head>
<!-- Three.js + satellite.js (no changes to 3D logic) -->
<style>
    /* Override for canvas page — nav + meta cards, rest from app.css */
</style>
<script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"}}
</script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
</head>
<body>

<nav th:replace="~{fragments/nav :: nav('')}"></nav>

<div hx-get="/hx/nav-status/scan"
     hx-swap="innerHTML"
     hx-target="#nav-status"
     hx-trigger="load"
     style="display:none"></div>

<main class="page-body">
    <div class="section-head"
         th:text="'Conjunction #' + ${visualization.id} + ' — Orbit Visualization'">
        Conjunction #8821 — Orbit Visualization
    </div>

    <!-- Meta cards -->
    <div class="viz-meta-grid">
        <div class="viz-meta-card">
            <div class="meta-label">TCA</div>
            <div class="meta-val sm"
                 th:text="${#temporals.format(visualization.tca, 'yyyy-MM-dd HH:mm:ss')}">
                2025-04-20 03:17:42
            </div>
        </div>
        <div class="viz-meta-card">
            <div class="meta-label">Miss Distance</div>
            <div class="meta-val">
                <span th:text="${#numbers.formatDecimal(visualization.missDistanceKm, 1, 3)}">0.051</span>
                <span style="font-size:13px;font-weight:400;color:var(--muted)"> km</span>
            </div>
        </div>
        <div class="viz-meta-card">
            <div class="meta-label">Rel. Velocity</div>
            <div class="meta-val">
                <span th:text="${#numbers.formatDecimal(visualization.relativeVelocityMS, 1, 1)}">14823.1</span>
                <span style="font-size:13px;font-weight:400;color:var(--muted)"> m/s</span>
            </div>
        </div>
        <div class="viz-meta-card pc-hi">
            <div class="meta-label" style="color:var(--pc-hi-t)">Collision Probability</div>
            <div class="meta-val" style="font-size:18px;color:var(--pc-hi-t)"
                 th:text="${#numbers.formatDecimal(visualization.collisionProbability, 1, 10)}">
                0.0000000821
            </div>
        </div>
    </div>

    <!-- Object cards -->
    <div class="viz-obj-grid">
        <div class="card" style="border-left:3px solid var(--accent)">
            <div class="card-title">Object 1</div>
            <div style="font-size:15px;font-weight:600">
                <a th:href="@{/satellites/{id}(id=${visualization.object1NoradId})}"
                   th:text="${visualization.object1Name}">ISS (ZARYA)</a>
            </div>
            <div style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:3px"
                 th:text="${visualization.object1NoradId} + ' · ' + ${visualization.object1Type}">
                25544 · PAYLOAD
            </div>
        </div>
        <div class="card" style="border-left:3px solid var(--err)">
            <div class="card-title" style="color:var(--err)">Object 2</div>
            <div style="font-size:15px;font-weight:600">
                <a style="color:var(--err)"
                   th:href="@{/satellites/{id}(id=${visualization.object2NoradId})}"
                   th:text="${visualization.object2Name}">STARLINK-1234</a>
            </div>
            <div style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:3px"
                 th:text="${visualization.object2NoradId} + ' · ' + ${visualization.object2Type}">
                43205 · PAYLOAD
            </div>
        </div>
    </div>

    <!-- 3D canvas (unchanged Three.js logic) -->
    <div id="canvas-container">
        <div id="time-display">Time: Loading…</div>

        <div id="viz-legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#60a5fa"></div>
                <span th:text="${visualization.object1Name}">ISS (ZARYA)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#f87171"></div>
                <span th:text="${visualization.object2Name}">STARLINK-1234</span>
            </div>
        </div>

        <div id="controls">
            <button class="viz-btn" id="reset">&#8634;</button>
            <button class="viz-btn" id="play-pause" style="border-color:var(--accent);color:var(--accent)">&#9208;
            </button>
            <input id="speed-slider" max="500" min="-500" type="range" value="100">
            <span id="speed-value">100×</span>
        </div>
    </div>
</main>

<!-- Inject TLE data for Three.js (unchanged) -->
<script th:inline="javascript">
    const visualizationData = {
        tca: /*[[${visualization.tca}]]*/ '',
        object1: {
            name: /*[[${visualization.object1Name}]]*/ '',
            tle1: /*[[${visualization.object1Tle1}]]*/ '',
            tle2: /*[[${visualization.object1Tle2}]]*/ ''
        },
        object2: {
            name: /*[[${visualization.object2Name}]]*/ '',
            tle1: /*[[${visualization.object2Tle1}]]*/ '',
            tle2: /*[[${visualization.object2Tle2}]]*/ ''
        }
    };
</script>

<!-- ── Three.js 3D scene (identical to original, no changes needed) ── -->
<script type="module">
    import * as THREE from 'three';
    import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
    import {Line2} from 'three/addons/lines/Line2.js';
    import {LineGeometry} from 'three/addons/lines/LineGeometry.js';
    import {LineMaterial} from 'three/addons/lines/LineMaterial.js';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 100, 100000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    new THREE.TextureLoader().load('/stars.webp', tex => {
        tex.mapping = THREE.EquirectangularReflectionMapping;
        tex.colorSpace = THREE.SRGBColorSpace;
        scene.background = tex;
        scene.backgroundIntensity = 0.3;
        scene.backgroundRotation.set(1.0973, 4.9368, 0, 'YXZ');
    });

    const earthMat = new THREE.MeshPhongMaterial({shininess: 80, specular: 0x444444});
    new THREE.TextureLoader().load('/earth.webp', tex => {
        earthMat.map = tex;
        earthMat.needsUpdate = true;
    });
    const earth = new THREE.Mesh(new THREE.SphereGeometry(6371, 64, 64), earthMat);
    scene.add(earth);

    const sunAngle = 4.895 + 0.01721 * (new Date(visualizationData.tca).getTime() / 86400000 - 10957.5);
    const sun = new THREE.PointLight(0xffffff, 1.2 * 50000 * 50000, 0, 2);
    sun.position.set(50000 * Math.cos(sunAngle), 19880 * Math.sin(sunAngle), -45870 * Math.sin(sunAngle));
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x606060));

    const satrec1 = satellite.twoline2satrec(visualizationData.object1.tle1, visualizationData.object1.tle2);
    const satrec2 = satellite.twoline2satrec(visualizationData.object2.tle1, visualizationData.object2.tle2);

    const sat1 = new THREE.Mesh(new THREE.SphereGeometry(120, 8, 8), new THREE.MeshBasicMaterial({color: 0x60a5fa}));
    const sat2 = new THREE.Mesh(new THREE.SphereGeometry(120, 8, 8), new THREE.MeshBasicMaterial({color: 0xf87171}));
    scene.add(sat1, sat2);

    function orbitalPeriodMs(satrec) {
        return 2 * Math.PI / satrec.no * 60000;
    }

    function eciPos(satrec, date) {
        const r = satellite.propagate(satrec, date);
        return r.position ? new THREE.Vector3(r.position.x, r.position.z, -r.position.y) : null;
    }

    function buildTrail(satrec, color, date) {
        const positions = [], period = orbitalPeriodMs(satrec), steps = 500;
        for (let i = 0; i <= steps; i++) {
            const p = eciPos(satrec, new Date(date.getTime() + (period / steps) * i));
            if (p) positions.push(p.x, p.y, p.z);
        }
        const geo = new LineGeometry();
        geo.setPositions(positions);
        const mat = new LineMaterial({
            color, linewidth: 2, transparent: true, opacity: 0.45,
            resolution: new THREE.Vector2(container.clientWidth, container.clientHeight)
        });
        return new Line2(geo, mat);
    }

    const distLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const distLine = new THREE.Line(distLineGeo, new THREE.LineBasicMaterial({
        color: 0xfbbf24,
        transparent: true,
        opacity: 0.6
    }));
    scene.add(distLine);

    const distDiv = document.createElement('div');
    distDiv.style.cssText = 'position:absolute;color:#fbbf24;font:bold 11px "IBM Plex Mono",monospace;pointer-events:none;z-index:10';
    container.appendChild(distDiv);

    const tcaDate = new Date(visualizationData.tca);
    const startTime = new Date(tcaDate.getTime() - 2 * 3600000);
    let currentTime = new Date(startTime), isPlaying = true, timeSpeed = 100;
    let trail1, trail2, trailEpoch = startTime.getTime();
    const trailMaxAge = Math.min(orbitalPeriodMs(satrec1), orbitalPeriodMs(satrec2));

    function rebuildTrails() {
        if (trail1) scene.remove(trail1, trail2);
        trail1 = buildTrail(satrec1, 0x60a5fa, currentTime);
        trail2 = buildTrail(satrec2, 0xf87171, currentTime);
        scene.add(trail1, trail2);
        trailEpoch = currentTime.getTime();
    }

    rebuildTrails();

    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.enablePan = false;
    orbitControls.minDistance = 7500;
    orbitControls.maxDistance = 50000;
    orbitControls.enableDamping = true;
    camera.position.set(0, 5000, 20000);

    const playPauseBtn = document.getElementById('play-pause');
    const speedValue = document.getElementById('speed-value');
    const speedSlider = document.getElementById('speed-slider');

    playPauseBtn.onclick = () => {
        isPlaying = !isPlaying;
        playPauseBtn.innerHTML = isPlaying ? '&#9208;' : '&#9654;';
    };
    document.getElementById('reset').onclick = () => {
        currentTime = new Date(startTime);
        speedSlider.value = 100;
        timeSpeed = 100;
        speedValue.textContent = '100×';
        rebuildTrails();
    };
    speedSlider.oninput = e => {
        timeSpeed = +e.target.value;
        speedValue.textContent = timeSpeed + '×';
    };

    function toScreen(v) {
        const ndc = v.clone().project(camera);
        return {x: (ndc.x + 1) / 2 * container.clientWidth, y: (-ndc.y + 1) / 2 * container.clientHeight};
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isPlaying) {
            currentTime = new Date(currentTime.getTime() + timeSpeed * (1000 / 60));
            if (Math.abs(currentTime.getTime() - trailEpoch) > trailMaxAge) rebuildTrails();
        }
        earth.rotation.y = satellite.gstime(currentTime);
        const p1 = eciPos(satrec1, currentTime), p2 = eciPos(satrec2, currentTime);
        if (p1 && p2) {
            sat1.position.copy(p1);
            sat2.position.copy(p2);
            const pos = distLine.geometry.attributes.position.array;
            pos[0] = p1.x;
            pos[1] = p1.y;
            pos[2] = p1.z;
            pos[3] = p2.x;
            pos[4] = p2.y;
            pos[5] = p2.z;
            distLine.geometry.attributes.position.needsUpdate = true;
            const dist = p1.distanceTo(p2);
            const mid = toScreen(p1.clone().add(p2).multiplyScalar(0.5));
            distDiv.textContent = dist.toFixed(1) + ' km';
            distDiv.style.left = mid.x + 'px';
            distDiv.style.top = mid.y + 'px';
        }
        orbitControls.update();
        const dt = (tcaDate - currentTime) / 1000;
        const m = Math.floor(Math.abs(dt) / 60), s = Math.floor(Math.abs(dt) % 60);
        document.getElementById('time-display').textContent =
            currentTime.toISOString().slice(0, 19).replace('T', ' ') +
            ' | ' + (dt >= 0 ? 'T−' : 'T+') + m + ':' + String(s).padStart(2, '0');
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
</script>

<footer class="app-footer" th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
