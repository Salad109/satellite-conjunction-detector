<table class="text-sm border border-gray-300" hx-indicator="#results">
    <thead class="bg-gray-50 text-gray-700 text-xs uppercase">
    <tr>
        <th class="px-4 py-2 border-b whitespace-nowrap">NORAD ID</th>
        <th class="px-4 py-2 border-b whitespace-nowrap">Name</th>
        <th class="px-4 py-2 border-b whitespace-nowrap">Type</th>
        <th class="px-4 py-2 border-b whitespace-nowrap">Country</th>
        <th class="px-4 py-2 border-b cursor-pointer hover:bg-gray-100 whitespace-nowrap"
            hx-target="#results"
            th:hx-get="'/hx/satellites?sort=perigeeKm,' + (${sortField == 'perigeeKm' && sortDir == 'asc'} ? 'desc' : 'asc')">
            Perigee (km)
            <span th:if="${sortField == 'perigeeKm' && sortDir == 'asc'}">&#9650;</span>
            <span th:if="${sortField == 'perigeeKm' && sortDir == 'desc'}">&#9660;</span>
        </th>
        <th class="px-4 py-2 border-b cursor-pointer hover:bg-gray-100 whitespace-nowrap"
            hx-target="#results"
            th:hx-get="'/hx/satellites?sort=apogeeKm,' + (${sortField == 'apogeeKm' && sortDir == 'asc'} ? 'desc' : 'asc')">
            Apogee (km)
            <span th:if="${sortField == 'apogeeKm' && sortDir == 'asc'}">&#9650;</span>
            <span th:if="${sortField == 'apogeeKm' && sortDir == 'desc'}">&#9660;</span>
        </th>
        <th class="px-4 py-2 border-b cursor-pointer hover:bg-gray-100 whitespace-nowrap"
            hx-target="#results"
            th:hx-get="'/hx/satellites?sort=inclination,' + (${sortField == 'inclination' && sortDir == 'asc'} ? 'desc' : 'asc')">
            Incl. (&deg;)
            <span th:if="${sortField == 'inclination' && sortDir == 'asc'}">&#9650;</span>
            <span th:if="${sortField == 'inclination' && sortDir == 'desc'}">&#9660;</span>
        </th>
        <th class="px-4 py-2 border-b cursor-pointer hover:bg-gray-100 whitespace-nowrap"
            hx-target="#results"
            th:hx-get="'/hx/satellites?sort=period,' + (${sortField == 'period' && sortDir == 'asc'} ? 'desc' : 'asc')">
            Period (min)
            <span th:if="${sortField == 'period' && sortDir == 'asc'}">&#9650;</span>
            <span th:if="${sortField == 'period' && sortDir == 'desc'}">&#9660;</span>
        </th>
        <th class="px-4 py-2 border-b cursor-pointer hover:bg-gray-100 whitespace-nowrap"
            hx-target="#results"
            th:hx-get="'/hx/satellites?sort=conjunctionCount,' + (${sortField == 'conjunctionCount' && sortDir == 'asc'} ? 'desc' : 'asc')">
            Conjunctions
            <span th:if="${sortField == 'conjunctionCount' && sortDir == 'asc'}">&#9650;</span>
            <span th:if="${sortField == 'conjunctionCount' && sortDir == 'desc'}">&#9660;</span>
        </th>
    </tr>
    </thead>
    <tbody>
    <tr th:class="${iter.odd} ? 'bg-white' : 'bg-gray-50'" th:each="s, iter : ${page.content}">
        <td class="px-4 py-2 border-b font-mono">
            <a class="text-blue-600 hover:underline" th:href="@{/satellites/{id}(id=${s.noradCatId})}"
               th:text="${s.noradCatId}"></a>
        </td>
        <td class="px-4 py-2 border-b" th:text="${s.objectName}"></td>
        <td class="px-4 py-2 border-b" th:text="${s.objectType}"></td>
        <td class="px-4 py-2 border-b" th:text="${s.countryCode} ?: '-'"></td>
        <td class="px-4 py-2 border-b font-mono"
            th:text="${s.perigee != null} ? ${#numbers.formatDecimal(s.perigee, 1, 1)} : '-'"></td>
        <td class="px-4 py-2 border-b font-mono"
            th:text="${s.apogee != null} ? ${#numbers.formatDecimal(s.apogee, 1, 1)} : '-'"></td>
        <td class="px-4 py-2 border-b font-mono"
            th:text="${s.inclination != null} ? ${#numbers.formatDecimal(s.inclination, 1, 2)} : '-'"></td>
        <td class="px-4 py-2 border-b font-mono"
            th:text="${s.period != null} ? ${#numbers.formatDecimal(s.period, 1, 1)} : '-'"></td>
        <td class="px-4 py-2 border-b font-mono text-center" th:text="${s.conjunctions}"></td>
    </tr>
    </tbody>
</table>

<div class="flex items-center gap-4 mt-4">
    <button class="border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded-sm text-sm"
            hx-target="#results"
            th:hx-get="'/hx/satellites?page=' + ${page.number - 1} + '&amp;sort=' + ${sortField} + ',' + ${sortDir}"
            th:if="${page.hasPrevious()}">
        Previous
    </button>

    <span class="text-sm text-gray-600" th:text="'Page ' + (${page.number} + 1) + ' of ' + ${page.totalPages}"></span>

    <button class="border border-gray-300 hover:bg-gray-50 px-3 py-1 rounded-sm text-sm"
            hx-target="#results"
            th:hx-get="'/hx/satellites?page=' + ${page.number + 1} + '&amp;sort=' + ${sortField} + ',' + ${sortDir}"
            th:if="${page.hasNext()}">
        Next
    </button>
</div>
