<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Conjunctions')}"></head>
<body>

<nav th:replace="~{fragments/nav :: nav('home')}"></nav>

<!-- Load scan status into nav on page load -->
<div hx-get="/hx/nav-status/scan"
     hx-swap="innerHTML"
     hx-target="#nav-status"
     hx-trigger="load"
     style="display:none"></div>

<main class="page-body">
    <div class="filter-bar">
        <label>
            <input hx-get="/hx/conjunctions"
                   hx-include="this"
                   hx-indicator="#results"
                   hx-target="#results"
                   hx-trigger="change"
                   id="includeFormations"
                   name="includeFormations"
                   type="checkbox">
            Include formations (&lt; 10 m/s)
        </label>
    </div>

    <div hx-get="/hx/conjunctions"
         hx-trigger="load"
         id="results">
        <p style="font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace">Loading conjunctions...</p>
    </div>
</main>

<footer class="app-footer" th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
