<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title th:text="${status} + ' - Conjunction Detector'">Error</title>
</head>
<body class="bg-white text-gray-900 p-8 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="flex flex-col items-center justify-center mt-32">
    <p class="text-8xl font-bold text-gray-200" th:text="${status}">404</p>
    <p class="text-lg text-gray-600 mt-4" th:text="${reason}">Not found</p>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
